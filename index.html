<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebGIS实验六 - 美国城市人口分布</title>
    <!-- 使用国内CDN -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/arcgis-js-api/5.0.0/esri/themes/light/main.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        .header {
            background: #2c3e66;
            color: white;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 10;
        }
        
        .logo-area h1 {
            font-size: 1.4rem;
            margin-bottom: 4px;
        }
        
        .logo-area p {
            font-size: 0.75rem;
            opacity: 0.85;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            background: rgba(255,255,255,0.15);
            padding: 6px 18px;
            border-radius: 30px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-weight: bold;
            font-size: 1.1rem;
        }
        
        .stat-label {
            font-size: 0.65rem;
            opacity: 0.8;
        }
        
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        .map-container {
            flex: 4;
            position: relative;
        }
        
        #viewDiv {
            width: 100%;
            height: 100%;
        }
        
        .basemap-gallery {
            flex: 1;
            background: #2c2c3a;
            color: white;
            padding: 16px;
            overflow-y: auto;
            box-shadow: -2px 0 10px rgba(0,0,0,0.2);
        }
        
        .basemap-gallery h3 {
            font-size: 1rem;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid #4a90e2;
            display: inline-block;
        }
        
        .basemap-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .basemap-card {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        
        .basemap-card:hover {
            background: #4a90e2;
            transform: translateY(-2px);
        }
        
        .basemap-card.active {
            background: #4a90e2;
            border: 1px solid white;
        }
        
        .basemap-icon {
            font-size: 1.5rem;
        }
        
        .basemap-name {
            font-size: 0.7rem;
            margin-top: 4px;
        }
        
        .info-panel {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 12px;
            font-size: 0.7rem;
            margin-top: 16px;
        }
        
        .info-panel p {
            margin: 6px 0;
            color: #ccc;
        }
        
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 8px; padding: 10px; }
            .main-content { flex-direction: column; }
            .basemap-gallery { flex: none; max-height: 200px; }
            .basemap-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo-area">
                <h1>🗺️ WebGIS实验六 - 美国城市人口分布</h1>
                <p>基于 ArcGIS Maps SDK 5.0 | GeoScene Online 专题图层</p>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="cityCount">--</div>
                    <div class="stat-label">城市数量</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="zoomLevel">--</div>
                    <div class="stat-label">缩放层级</div>
                </div>
            </div>
        </header>

        <div class="main-content">
            <div class="map-container">
                <div id="viewDiv"></div>
            </div>
            <div class="basemap-gallery">
                <h3>🎨 底图库</h3>
                <div class="basemap-grid" id="basemapGrid"></div>
                <div class="info-panel">
                    <h3>📊 图层信息</h3>
                    <p>📍 数据源：GeoScene Online</p>
                    <p>🗺️ 图层：美国城市人口数量变化</p>
                    <p>🔧 微件：比例尺 | 图例 | 搜索 | 图层列表</p>
                    <p>📈 可视化：分级设色（人口数量）</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 使用国内CDN加速 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/arcgis-js-api/5.0.0/init.js"></script>
    <script>
        // 等待 ArcGIS API 加载完成
        function initMap() {
            require([
                "esri/Map",
                "esri/views/MapView",
                "esri/layers/FeatureLayer",
                "esri/widgets/ScaleBar",
                "esri/widgets/Legend",
                "esri/widgets/Search",
                "esri/widgets/LayerList",
                "esri/widgets/Zoom",
                "esri/widgets/Home"
            ], function(Map, MapView, FeatureLayer, ScaleBar, Legend, Search, LayerList, Zoom, Home) {
                
                console.log("✅ ArcGIS API 加载成功");
                
                // 创建图层
                const populationLayer = new FeatureLayer({
                    url: "https://www.geosceneonline.cn/server/rest/services/Hosted/美国城市人口数量变化116165/FeatureServer",
                    title: "美国城市人口数量变化",
                    outFields: ["*"],
                    popupTemplate: {
                        title: "城市信息",
                        content: "城市名称: {NAME}<br>人口数量: {POPULATION}"
                    }
                });
                
                // 创建地图
                const map = new Map({
                    basemap: "osm-streets",
                    layers: [populationLayer]
                });
                
                // 创建视图
                const view = new MapView({
                    container: "viewDiv",
                    map: map,
                    center: [-100, 40],
                    zoom: 4
                });
                
                // 视图加载完成
                view.when(function() {
                    console.log("✅ 地图加载成功");
                    document.getElementById('cityCount').innerText = "加载中...";
                    
                    // 查询城市数量
                    populationLayer.queryFeatureCount().then(function(count) {
                        document.getElementById('cityCount').innerText = count;
                    }).catch(function(err) {
                        document.getElementById('cityCount').innerText = "0";
                    });
                    
                    view.watch('zoom', function(val) {
                        document.getElementById('zoomLevel').innerText = val.toFixed(1);
                    });
                });
                
                // 添加微件
                view.ui.add(new ScaleBar({ view: view, unit: "metric" }), "bottom-left");
                view.ui.add(new Legend({ view: view }), "top-right");
                view.ui.add(new Search({ view: view }), "top-left");
                view.ui.add(new LayerList({ view: view }), "top-right");
                view.ui.add(new Zoom({ view: view }), "bottom-right");
                view.ui.add(new Home({ view: view }), "bottom-right");
                
                // 底图库
                const basemaps = [
                    { id: "osm-streets", name: "街道图", icon: "🌆" },
                    { id: "satellite", name: "卫星图", icon: "🛰️" },
                    { id: "hybrid", name: "混合图", icon: "🗺️" },
                    { id: "terrain", name: "地形图", icon: "⛰️" }
                ];
                
                const container = document.getElementById('basemapGrid');
                basemaps.forEach(function(bm) {
                    const card = document.createElement('div');
                    card.className = 'basemap-card';
                    card.innerHTML = `<div class="basemap-icon">${bm.icon}</div><div class="basemap-name">${bm.name}</div>`;
                    card.onclick = function() {
                        map.basemap = bm.id;
                        document.querySelectorAll('.basemap-card').forEach(function(c) {
                            c.classList.remove('active');
                        });
                        card.classList.add('active');
                    };
                    container.appendChild(card);
                });
                
                console.log("✅ WebGIS应用启动完成");
            });
        }
        
        // 检查 API 是否已加载
        if (typeof require !== 'undefined') {
            initMap();
        } else {
            window.addEventListener('load', function() {
                setTimeout(initMap, 500);
            });
        }
    </script>
</body>
</html>
